<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chapaa · Moyo Platform</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.0/babel.min.js"></script>

<style>
  :root {
    --navy: #0B1330;
    --navy-2: #131C44;
    --navy-3: #1B2658;
    --teal: #15B894;
    --teal-2: #1FD1A8;
    --teal-light: #B8ECD9;
    --teal-soft: #E6F8F1;
    --green-deep: #04372C;
    --ink: #0A1029;
    --ink-2: #2A3358;
    --muted: #6B7595;
    --muted-2: #9AA3BD;
    --line: #E7EAF3;
    --line-2: #F1F3F9;
    --bg: #F7F8FC;
    --bg-2: #FBFCFD;
    --white: #FFFFFF;
    --rose: #E5547D;
    --amber: #E89B3C;
    --serif: 'Plus Jakarta Sans', -apple-system, sans-serif;
    --sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'Roboto Mono', 'SF Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ============ TOP SWITCHER ============ */
  .view-switch {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 1000;
    background: var(--navy);
    padding: 4px;
    border-radius: 999px;
    display: flex;
    gap: 2px;
    box-shadow: 0 8px 24px rgba(11,19,48,0.25), 0 2px 6px rgba(11,19,48,0.15);
  }
  .view-switch button {
    background: transparent; color: rgba(255,255,255,0.6); border: none;
    padding: 8px 18px; border-radius: 999px; font-family: var(--sans);
    font-size: 12px; font-weight: 500; letter-spacing: 0.02em;
    cursor: pointer; transition: all 0.2s;
  }
  .view-switch button.active {
    background: var(--teal); color: var(--green-deep);
    font-weight: 600;
  }
  .view-switch button:hover:not(.active) { color: rgba(255,255,255,0.95); }

  /* ============ DASHBOARD LAYOUT ============ */
  .dash-wrap { display: flex; min-height: 100vh; }

  .sidebar {
    width: 240px;
    background: var(--navy);
    color: #fff;
    padding: 28px 16px 24px;
    position: sticky; top: 0; height: 100vh;
    display: flex; flex-direction: column;
    flex-shrink: 0;
  }
  .brand { display: flex; align-items: center; gap: 10px; padding: 0 8px 28px; }
  .brand-mark {
    width: 32px; height: 32px; border-radius: 9px;
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-2) 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .brand-mark svg { width: 18px; height: 18px; }
  .brand-text { line-height: 1.1; }
  .brand-text .nm { font-family: var(--sans); font-size: 17px; letter-spacing: -0.01em; font-weight: 700; }
  .brand-text .sub { font-size: 10px; color: var(--teal-light); letter-spacing: 0.12em; text-transform: uppercase; }

  .nav-section { margin-bottom: 18px; }
  .nav-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.4); padding: 0 12px 8px; font-weight: 500; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px; cursor: pointer;
    color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500;
    transition: all 0.15s;
  }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .nav-item.active { background: var(--navy-3); color: #fff; }
  .nav-item.active .ico { color: var(--teal-2); }
  .ico { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.85; }
  .nav-item.active .ico { opacity: 1; }
  .nav-badge { margin-left: auto; background: var(--teal); color: var(--green-deep); font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px; }

  .sidebar-foot {
    margin-top: auto;
    padding: 12px;
    background: var(--navy-2);
    border-radius: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-2) 100%);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; color: var(--green-deep); font-size: 13px;
    flex-shrink: 0;
  }
  .sidebar-foot .nm { font-size: 12px; font-weight: 600; color: #fff; line-height: 1.2; }
  .sidebar-foot .role { font-size: 10px; color: var(--teal-light); }

  /* ============ MAIN ============ */
  .main { flex: 1; min-width: 0; padding: 56px 40px 40px; }

  .pageHead { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 28px; flex-wrap: wrap; }
  .pageHead .crumb { font-size: 11px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; font-weight: 500; }
  .pageHead h1 { font-family: var(--sans); font-size: 36px; line-height: 1.05; letter-spacing: -0.025em; color: var(--ink); font-weight: 700; }
  .pageHead h1 em { font-style: normal; color: var(--teal); font-weight: 700; }
  .pageHead .sub { color: var(--muted); margin-top: 8px; font-size: 13.5px; }

  .head-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    border: none; cursor: pointer; font-family: var(--sans);
    font-size: 12.5px; font-weight: 500; padding: 10px 16px;
    border-radius: 9px; display: inline-flex; align-items: center; gap: 7px;
    transition: all 0.15s;
  }
  .btn-ghost { background: var(--white); color: var(--ink); border: 1px solid var(--line); }
  .btn-ghost:hover { background: var(--bg); border-color: #D8DDEA; }
  .btn-dark { background: var(--navy); color: #fff; }
  .btn-dark:hover { background: var(--navy-2); }
  .btn-teal { background: var(--teal); color: var(--green-deep); font-weight: 600; }
  .btn-teal:hover { background: var(--teal-2); }
  .btn-icon { padding: 9px; }

  /* KPI HERO */
  .kpi-hero {
    background: var(--navy);
    background-image:
      radial-gradient(ellipse 800px 400px at 100% 0%, rgba(21,184,148,0.18), transparent 60%),
      radial-gradient(ellipse 600px 300px at 0% 100%, rgba(31,209,168,0.10), transparent 70%);
    color: #fff;
    border-radius: 18px;
    padding: 28px 32px;
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1fr;
    gap: 28px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .kpi-hero::after {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60'><circle cx='30' cy='30' r='0.5' fill='%23fff' opacity='0.06'/></svg>");
    pointer-events: none;
  }
  .hero-main { position: relative; z-index: 1; }
  .hero-main .label {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(21,184,148,0.18); color: var(--teal-2);
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 5px 10px; border-radius: 999px; font-weight: 600;
    margin-bottom: 14px;
  }
  .hero-main .label .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal-2); box-shadow: 0 0 0 3px rgba(31,209,168,0.25); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  .big-amount { font-family: var(--sans); font-size: 48px; line-height: 1.05; letter-spacing: -0.025em; font-weight: 700; }
  .big-amount .cur { font-family: var(--sans); font-size: 18px; color: var(--teal-2); font-weight: 500; letter-spacing: 0.04em; vertical-align: top; margin-right: 4px; }
  .hero-main .of { color: rgba(255,255,255,0.55); font-size: 13px; margin-top: 8px; }
  .hero-main .of b { color: #fff; font-weight: 600; }

  .progress-wrap { margin-top: 18px; }
  .progress-bar {
    height: 8px; background: rgba(255,255,255,0.08);
    border-radius: 999px; overflow: hidden; position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal) 0%, var(--teal-2) 100%);
    border-radius: 999px;
    box-shadow: 0 0 24px rgba(31,209,168,0.5);
    position: relative;
  }
  .progress-fill::after {
    content: ''; position: absolute; right: 0; top: -2px;
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff; box-shadow: 0 0 12px rgba(31,209,168,0.8);
  }
  .progress-meta { display: flex; justify-content: space-between; margin-top: 10px; font-size: 11px; color: rgba(255,255,255,0.6); }

  .hero-stat { position: relative; z-index: 1; padding-left: 24px; border-left: 1px solid rgba(255,255,255,0.08); }
  .hero-stat .lbl { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.55); font-weight: 500; }
  .hero-stat .val { font-family: var(--sans); font-size: 28px; margin-top: 6px; line-height: 1.05; letter-spacing: -0.02em; font-weight: 700; }
  .hero-stat .delta { font-size: 11px; margin-top: 8px; display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 999px; font-weight: 500; }
  .delta-up { background: rgba(31,209,168,0.15); color: var(--teal-2); }
  .delta-down { background: rgba(229,84,125,0.15); color: var(--rose); }
  .delta-flat { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }

  .card {
    background: var(--white); border-radius: 16px;
    border: 1px solid var(--line);
    padding: 24px;
  }
  .card-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
  .card-head h3 { font-family: var(--sans); font-size: 17px; line-height: 1.2; letter-spacing: -0.015em; color: var(--ink); font-weight: 700; }
  .card-head .sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .card-head .actions { display: flex; gap: 4px; }

  .seg {
    display: inline-flex; background: var(--bg); border-radius: 8px; padding: 3px;
    border: 1px solid var(--line);
  }
  .seg button {
    border: none; background: transparent; cursor: pointer; padding: 5px 10px;
    font-family: var(--sans); font-size: 11.5px; font-weight: 500; color: var(--muted);
    border-radius: 6px; transition: all 0.15s;
  }
  .seg button.active { background: var(--white); color: var(--ink); box-shadow: 0 1px 3px rgba(11,19,48,0.06); }

  /* CONTRIBUTORS TABLE */
  .table { width: 100%; border-collapse: collapse; }
  .table th {
    text-align: left; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); font-weight: 500; padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .table th:last-child, .table td:last-child { text-align: right; }
  .table td { padding: 14px 0; border-bottom: 1px solid var(--line-2); font-size: 13px; vertical-align: middle; }
  .table tr:last-child td { border-bottom: none; }
  .contrib { display: flex; align-items: center; gap: 11px; }
  .contrib-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 11px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--teal-soft), var(--teal-light));
    color: var(--green-deep);
  }
  .contrib-avatar.v2 { background: linear-gradient(135deg, #FFE9D6, #FFD0A6); color: #8B4A1A; }
  .contrib-avatar.v3 { background: linear-gradient(135deg, #E0E2F8, #C5C9F0); color: #3D448A; }
  .contrib-avatar.v4 { background: linear-gradient(135deg, #FFD8E2, #FFB1C5); color: #8B2D4A; }
  .contrib-name { font-weight: 600; color: var(--ink); }
  .contrib-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .amount-cell { font-family: var(--mono); font-weight: 600; font-size: 13px; }
  .channel-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 500;
    background: var(--bg); color: var(--ink-2);
    border: 1px solid var(--line);
  }
  .channel-tag .pip { width: 5px; height: 5px; border-radius: 50%; }

  /* WITHDRAWAL CARD */
  .withdraw-card {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%);
    color: #fff;
    border-radius: 16px;
    padding: 24px;
    position: relative; overflow: hidden;
  }
  .withdraw-card::before {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(21,184,148,0.25) 0%, transparent 70%);
  }
  .withdraw-card .lbl { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--teal-2); font-weight: 600; }
  .withdraw-card .avail { font-family: var(--sans); font-size: 30px; margin-top: 8px; line-height: 1.05; letter-spacing: -0.02em; font-weight: 700; }
  .withdraw-card .avail .cur { font-family: var(--sans); font-size: 13px; color: var(--teal-2); font-weight: 500; margin-right: 4px; }
  .withdraw-card .desc { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 6px; }
  .withdraw-card .btn-teal { width: 100%; justify-content: center; margin-top: 18px; padding: 12px; font-size: 13px; }
  .withdraw-card .recent { margin-top: 18px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.08); }
  .withdraw-card .recent-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 12px; }
  .withdraw-card .recent-row .l { color: rgba(255,255,255,0.5); font-size: 11px; }
  .withdraw-card .recent-row .r { font-family: var(--mono); font-weight: 500; }
  .withdraw-card .recent-row .badge {
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 4px; font-weight: 600; margin-left: 8px;
  }
  .badge-paid { background: rgba(31,209,168,0.18); color: var(--teal-2); }
  .badge-pend { background: rgba(232,155,60,0.18); color: var(--amber); }

  /* CHANNEL DONUT card */
  .channel-list { margin-top: 14px; }
  .channel-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--line-2); }
  .channel-row:last-child { border: none; }
  .channel-pip { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .channel-row .nm { font-size: 12.5px; font-weight: 500; flex: 1; }
  .channel-row .v { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--muted); }
  .channel-row .pct { font-size: 11px; color: var(--ink); margin-left: 10px; min-width: 36px; text-align: right; font-weight: 600; }

  /* GEO LIST */
  .geo-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; }
  .geo-row .flag { font-size: 18px; }
  .geo-row .nm { font-size: 12.5px; font-weight: 500; flex: 1; }
  .geo-row .bar-w { flex: 1.2; height: 5px; background: var(--line-2); border-radius: 999px; overflow: hidden; max-width: 110px; }
  .geo-row .bar-f { height: 100%; background: linear-gradient(90deg, var(--teal), var(--teal-2)); border-radius: 999px; }
  .geo-row .v { font-family: var(--mono); font-size: 11.5px; color: var(--muted); min-width: 50px; text-align: right; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(11,19,48,0.55);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 2000; padding: 20px;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: #fff; border-radius: 18px;
    width: 100%; max-width: 480px;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(11,19,48,0.3);
    animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-head {
    padding: 22px 26px 18px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-head h3 { font-family: var(--sans); font-size: 20px; line-height: 1.2; letter-spacing: -0.015em; font-weight: 700; }
  .modal-head .step { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }
  .modal-close { background: var(--bg); border: none; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); }
  .modal-close:hover { background: var(--line); color: var(--ink); }

  .step-track { display: flex; gap: 6px; padding: 14px 26px 0; }
  .step-track .seg-bar { flex: 1; height: 3px; background: var(--line); border-radius: 999px; overflow: hidden; }
  .step-track .seg-bar.done { background: var(--teal); }
  .step-track .seg-bar.active { background: linear-gradient(90deg, var(--teal) 50%, var(--line) 50%); }

  .modal-body { padding: 24px 26px; }
  .modal-body label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 600; display: block; margin-bottom: 7px; }
  .modal-body .field { margin-bottom: 18px; }
  .modal-body input, .modal-body select {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 10px; font-family: var(--sans); font-size: 14px;
    color: var(--ink); background: #fff;
    transition: all 0.15s;
  }
  .modal-body input:focus, .modal-body select:focus {
    outline: none; border-color: var(--teal);
    box-shadow: 0 0 0 4px rgba(21,184,148,0.12);
  }
  .modal-body .input-prefix {
    position: relative;
  }
  .modal-body .input-prefix .pf {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-family: var(--mono); font-size: 13px; color: var(--muted); font-weight: 500;
    pointer-events: none;
  }
  .modal-body .input-prefix input { padding-left: 50px; font-family: var(--mono); font-size: 18px; font-weight: 600; }

  .channel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .channel-opt {
    border: 1.5px solid var(--line); padding: 12px; border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; gap: 10px; transition: all 0.15s;
  }
  .channel-opt:hover { border-color: var(--teal-light); background: var(--teal-soft); }
  .channel-opt.selected { border-color: var(--teal); background: var(--teal-soft); }
  .channel-opt .ico-box { width: 30px; height: 30px; border-radius: 7px; background: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; font-weight: 700; }
  .channel-opt .nm { font-size: 12.5px; font-weight: 600; line-height: 1.2; }
  .channel-opt .acct { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 2px; }

  .summary-box {
    background: var(--bg); border-radius: 12px; padding: 16px 18px;
  }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13px; }
  .summary-row .l { color: var(--muted); }
  .summary-row .r { font-family: var(--mono); font-weight: 600; }
  .summary-row.total { border-top: 1px solid var(--line); margin-top: 8px; padding-top: 12px; font-size: 14px; }
  .summary-row.total .r { font-size: 17px; color: var(--teal); }

  .otp-grid { display: flex; gap: 8px; justify-content: center; margin: 12px 0 8px; }
  .otp-grid input {
    width: 48px; height: 56px; text-align: center;
    font-family: var(--mono); font-size: 22px; font-weight: 600;
    padding: 0;
  }
  .otp-help { text-align: center; font-size: 12px; color: var(--muted); margin-top: 16px; }
  .otp-help a { color: var(--teal); font-weight: 600; cursor: pointer; text-decoration: none; }

  .success-box { text-align: center; padding: 12px 0 4px; }
  .success-icon {
    width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 16px;
    background: linear-gradient(135deg, var(--teal), var(--teal-2));
    display: flex; align-items: center; justify-content: center;

function ChartCanvas({ type, data, options, height = 280 }) {
  const ref = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, { type, data, options });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [type, JSON.stringify(data), JSON.stringify(options)]);

  return (
    <div style={{ position: 'relative', width: '100%', height }}>
      <canvas ref={ref}></canvas>
    </div>
  );
}

// =================== WITHDRAW MODAL ===================
function WithdrawModal({ open, onClose }) {
  const [step, setStep] = useState(1);
  const [amount, setAmount] = useState('500000000');
  const [channel, setChannel] = useState('nmb');
  const [otp, setOtp] = useState(['','','','','','']);
  const [refCode] = useState('WD-' + Math.floor(9000 + Math.random()*999));

  useEffect(() => {
    if (open) { setStep(1); setOtp(['','','','','','']); }
  }, [open]);

  if (!open) return null;

  const FEE = 0.005;
  const amt = parseInt(amount || 0);
  const fee = Math.round(amt * FEE);
  const net = amt - fee;

  const channels = [
    { id: 'nmb',   name: 'NMB Bank',     acct: '****  2841',    icon: 'N', color: '#FFB800', tx: '#1A1A1A' },
    { id: 'crdb',  name: 'CRDB Bank',    acct: '****  9173',    icon: 'C', color: '#00A859', tx: '#fff' },
    { id: 'mpesa', name: 'M-Pesa',       acct: '+255 *** 4421', icon: 'M', color: '#E60000', tx: '#fff' },
    { id: 'tigo',  name: 'Tigo Pesa',    acct: '+255 *** 7805', icon: 'T', color: '#0066CC', tx: '#fff' },
  ];
  const sel = channels.find(c => c.id === channel);

  const onOtpChange = (i, v) => {
    if (!/^\d*$/.test(v)) return;
    const next = [...otp]; next[i] = v.slice(-1); setOtp(next);
    if (v && i < 5) {
      const el = document.getElementById('otp-' + (i+1));
      el && el.focus();
    }
  };
  const otpFull = otp.every(x => x);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <div>
            <h3>{step < 4 ? 'Withdraw funds' : 'Withdrawal initiated'}</h3>
            {step < 4 && <div className="step" style={{ marginTop: 4 }}>Step {step} of 3</div>}
          </div>
          <button className="modal-close" onClick={onClose}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        {step < 4 && (
          <div className="step-track">
            <div className={'seg-bar ' + (step >= 1 ? (step === 1 ? 'active' : 'done') : '')}></div>
            <div className={'seg-bar ' + (step >= 2 ? (step === 2 ? 'active' : 'done') : '')}></div>
            <div className={'seg-bar ' + (step >= 3 ? (step === 3 ? 'active' : 'done') : '')}></div>
          </div>
        )}

        <div className="modal-body">
          {step === 1 && (
            <>
              <div className="field">
                <label>Available balance</label>
                <div style={{ fontFamily: 'var(--sans)', fontSize: 28, color: 'var(--ink)', letterSpacing: '-0.02em', fontWeight: 700 }}>
                  TZS {fmtTZSFull(AVAILABLE)}
                </div>
              </div>
              <div className="field">
                <label>Amount to withdraw</label>
                <div className="input-prefix">
                  <span className="pf">TZS</span>
                  <input type="text" value={amt.toLocaleString()} onChange={e => setAmount(e.target.value.replace(/\D/g,''))}/>
                </div>
              </div>
              <div className="field">
                <label>Disbursement to</label>
                <div className="channel-grid">
                  {channels.map(c => (
                    <div key={c.id} className={'channel-opt ' + (channel === c.id ? 'selected' : '')} onClick={() => setChannel(c.id)}>
                      <div className="ico-box" style={{ background: c.color, color: c.tx }}>{c.icon}</div>
                      <div>
                        <div className="nm">{c.name}</div>
                        <div className="acct">{c.acct}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </>
          )}

          {step === 2 && (
            <>
              <div style={{ marginBottom: 16, fontSize: 13, color: 'var(--muted)' }}>
                Please review the details below. Once confirmed, an OTP will be sent to your registered admin phone.
              </div>
              <div className="summary-box">
                <div className="summary-row"><span className="l">Withdrawal amount</span><span className="r">TZS {fmtTZSFull(amt)}</span></div>
                <div className="summary-row"><span className="l">Platform fee (0.5%)</span><span className="r">– TZS {fmtTZSFull(fee)}</span></div>
                <div className="summary-row"><span className="l">Disbursement to</span><span className="r" style={{ fontFamily: 'var(--sans)' }}>{sel.name} {sel.acct}</span></div>
                <div className="summary-row"><span className="l">Estimated arrival</span><span className="r" style={{ fontFamily: 'var(--sans)' }}>Within 2 hours</span></div>
                <div className="summary-row total"><span className="l">Net to receive</span><span className="r">TZS {fmtTZSFull(net)}</span></div>
              </div>
              <div style={{ marginTop: 14, padding: '11px 14px', background: 'var(--teal-soft)', borderRadius: 10, fontSize: 12, color: 'var(--green-deep)', display: 'flex', gap: 9, alignItems: 'flex-start' }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ flexShrink: 0, marginTop: 1 }}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span>Withdrawals over TZS 100M require co-approval from a second authorised admin within 30 minutes.</span>
              </div>
            </>
          )}

          {step === 3 && (
            <>
              <div style={{ textAlign: 'center', marginBottom: 18 }}>
                <div style={{ width: 48, height: 48, borderRadius: 12, background: 'var(--teal-soft)', color: 'var(--teal)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 12 }}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <h4 style={{ fontFamily: 'var(--sans)', fontSize: 20, lineHeight: 1.2, fontWeight: 700, letterSpacing: '-0.015em' }}>Verify with 2FA</h4>
                <p style={{ color: 'var(--muted)', fontSize: 13, marginTop: 6 }}>We've sent a 6-digit code to <b style={{ color: 'var(--ink)' }}>+255 *** 4421</b></p>
              </div>
              <div className="otp-grid">
                {otp.map((v, i) => (
                  <input key={i} id={'otp-'+i} value={v}
                    onChange={e => onOtpChange(i, e.target.value)}
                    onKeyDown={e => { if (e.key==='Backspace' && !v && i>0) { const el = document.getElementById('otp-'+(i-1)); el && el.focus(); }}}
                    inputMode="numeric" maxLength={1}/>
                ))}
              </div>
              <div className="otp-help">Didn't get the code? <a>Resend in 0:42</a></div>
            </>
          )}

          {step === 4 && (
            <div className="success-box">
              <div className="success-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#04372C" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <h4>Withdrawal initiated</h4>
              <p>TZS {fmtTZSFull(net)} is on its way to <b style={{ color: 'var(--ink)' }}>{sel.name} {sel.acct}</b>.<br/>You'll get a confirmation SMS once it lands.</p>
              <div className="ref-box">
                <span className="l">Reference</span>
                <span className="r">{refCode}</span>
              </div>
            </div>
          )}
        </div>

        <div className="modal-foot">
          {step === 1 && (
            <>
              <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
              <button className="btn btn-dark" onClick={() => setStep(2)} disabled={!amt}>Continue</button>
            </>
          )}
          {step === 2 && (
            <>
              <button className="btn btn-ghost" onClick={() => setStep(1)}>Back</button>
              <button className="btn btn-dark" onClick={() => setStep(3)}>Send verification code</button>
            </>
          )}
          {step === 3 && (
            <>
              <button className="btn btn-ghost" onClick={() => setStep(2)}>Back</button>
              <button className="btn btn-teal" onClick={() => setStep(4)} disabled={!otpFull}>Verify & withdraw</button>
            </>
          )}
          {step === 4 && (
            <button className="btn btn-dark" onClick={onClose} style={{ marginLeft: 'auto' }}>Done</button>
          )}
        </div>
      </div>
    </div>
  );
}

  return (

        <button className={view==='dashboard'?'active':''} onClick={() => setView('dashboard')}>Partner dashboard</button>
        <button className={view==='public'?'active':''}    onClick={() => setView('public')}>Public page</button>
      </div>
      {view === 'dashboard'
        ? <Dashboard onOpenWithdraw={() => setWithdrawOpen(true)}/>
        : <PublicPage/>}
      <WithdrawModal open={withdrawOpen} onClose={() => setWithdrawOpen(false)}/>
    </>
  );
}
